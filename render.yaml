services:
  - type: web
    name: betintel-api
    runtime: node
    rootDir: apps/api
    buildCommand: yarn
    startCommand: yarn start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: FRONTEND_ORIGIN
        value: "https://your-web-domain.onrender.com"

  - type: web
    name: betintel-web
    runtime: node
    rootDir: apps/web
    buildCommand: yarn && yarn build
    startCommand: yarn start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_BASE_URL
        value: "https://your-api-domain.onrender.com"
